// ── CALENDAR HELPERS ───────────────────────────────────────────
function eventOccursOnDate(ev,dateStr){
if(!ev.recurring||ev.recurring===‘none’)return ev.date===dateStr;
if(ev.recurring===‘daily’)return true;
const dow=new Date(dateStr+‘T12:00:00’).getDay();
if(ev.recurring===‘weekdays’)return dow>=1&&dow<=5;
if(ev.recurring===‘weekly’||ev.recurring===‘custom’)return(ev.recurringDays||[]).includes(dow);
return false;
}

function getDayEvents(events,dateStr){
return events.filter(ev=>eventOccursOnDate(ev,dateStr));
}

function computeLayout(items){
// items must have startTime, endTime, id
const sorted=[…items].sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));
const lanes=[];
const result={};
for(const ev of sorted){
const start=toMin(ev.startTime);const end=toMin(ev.endTime);
let laneIdx=lanes.findIndex(laneEnd=>laneEnd<=start);
if(laneIdx===-1){laneIdx=lanes.length;lanes.push(end);}
else{lanes[laneIdx]=end;}
result[ev.id]={lane:laneIdx,totalLanes:1};
}
for(const ev of sorted){
const start=toMin(ev.startTime);const end=toMin(ev.endTime);
const overlapping=sorted.filter(o=>o.id!==ev.id&&toMin(o.startTime)<end&&toMin(o.endTime)>start);
if(overlapping.length>0){
const maxLane=Math.max(…overlapping.map(o=>result[o.id]?.lane||0),result[ev.id]?.lane||0);
const totalLanes=maxLane+1;
result[ev.id].totalLanes=totalLanes;
overlapping.forEach(o=>{if(result[o.id])result[o.id].totalLanes=Math.max(result[o.id].totalLanes,totalLanes);});
}
}
return result;
}

function timeToPx(timeStr){
const m=toMin(timeStr);
return(m-GRID_START*60)/60*HOUR_H;
}

function pxToTime(px){
const totalMin=Math.round((px/HOUR_H*60+GRID_START*60)/15)*15;
return toHM(Math.max(GRID_START*60,Math.min(GRID_END*60-15,totalMin)));
}

async function cortexCall(state,userMsg,sysOverride){
const{profile,tasks,habits,goals,xp,totalTasks}=state;
const td=todayStr();
const doneT=tasks.filter(t=>t.completedAt?.startsWith(td)).length;

‘== PROFIL ==’,
`Nom: ${profile.name||'Utilisateur'} | XP: ${xp} | Tâches: ${totalTasks}`,
`Objectifs: ${ag.map(g=>`${g.title}(${g.progress}%)`).join(', ')||'aucun'}`,
`Aujourd'hui: ${doneT} faites, en attente: ${tasks.filter(t=>t.status==='pending').slice(0,5).map(t=>`${t.title}(P${t.priority})`).join(', ')||'aucune'}`,
`Habitudes: ${habits.slice(0,5).map(h=>`${h.title}(streak:${h.streak}j)`).join(', ')||'aucune'}`,
].join(’\n’);
const sys=sysOverride||`Tu es Cortex, le coach IA de NEXUS. Tu connais l'utilisateur grâce à son profil.\nRéponds en français, directement, de façon actionnable. Max 3 paragraphes.\nNe commence jamais par "Bien sûr" ou "En tant qu'IA".\n${ctx}`;
if(!profile.apiKey&&profile.provider!==‘ollama’)throw new Error(‘Clé API manquante — configure dans Paramètres.’);
if(profile.provider===‘anthropic’){
const r=await fetch(‘https://api.anthropic.com/v1/messages’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’,‘x-api-key’:profile.apiKey,‘anthropic-version’:‘2023-06-01’},body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:1000,system:sys,messages:[{role:‘user’,content:userMsg}]})});
if(!r.ok){const e=await r.text();throw new Error(`API: ${e.slice(0,180)}`);}
const d=await r.json();return d.content?.[0]?.text||’’;
}
if(profile.provider===‘groq’){
const r=await fetch(‘https://api.groq.com/openai/v1/chat/completions’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’,‘Authorization’:`Bearer ${profile.apiKey}`},body:JSON.stringify({model:‘llama3-70b-8192’,max_tokens:1000,messages:[{role:‘system’,content:sys},{role:‘user’,content:userMsg}]})});
if(!r.ok)throw new Error(‘Erreur Groq’);const d=await r.json();return d.choices?.[0]?.message?.content||’’;
}
if(profile.provider===‘ollama’){
const r=await fetch(`${profile.ollamaUrl}/api/generate`,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},body:JSON.stringify({model:‘llama3’,prompt:`${sys}\n\nUtilisateur: ${userMsg}\nCortex:`,stream:false})});
if(!r.ok)throw new Error(‘Erreur Ollama’);const d=await r.json();return d.response||’’;
}
throw new Error(‘Provider non configuré’);
}

// ── ALGORITHMIC FALLBACK PLAN ──────────────────────────────────
function buildAlgoPlan(state,dateStr){
const{profile,tasks,habits,events}=state;
const dow=new Date(dateStr+‘T12:00:00’).getDay();
const fixedEvs=getDayEvents(events,dateStr).map(e=>({start:toMin(e.startTime),end:toMin(e.endTime)}));
const wake=toMin(profile.wake||‘07:00’);const sleep=toMin(profile.sleep||‘23:00’);
const peakS=toMin(profile.peakS||‘09:00’);const peakE=toMin(profile.peakE||‘12:00’);
const isBlocked=(s,e)=>fixedEvs.some(f=>s<f.end&&e>f.start);
const findSlot=(from,dur)=>{
let cur=from;
while(cur+dur<=sleep-30){
if(!isBlocked(cur,cur+dur))return cur;
const blocking=fixedEvs.find(f=>cur<f.end&&cur+dur>f.start);
cur=blocking?blocking.end+5:cur+5;
}
return null;
};
let cur=wake+30;const blocks=[];let xpEst=0;
const todayH=habits.filter(h=>(h.frequency===‘daily’||(h.targetDays||[]).includes(dow))&&!h.history.includes(dateStr));
for(const h of todayH.slice(0,2)){
const dur=h.estimatedMinutes||20;const slot=findSlot(cur,dur);
if(slot!==null){blocks.push({id:uid(),type:‘habit’,refId:h.id,title:`${h.emoji||'🔁'} ${h.title}`,startTime:toHM(slot),endTime:toHM(slot+dur),xpValue:Math.round(h.xpBase*(1+Math.min(h.streak/7,.5))),colorId:‘green’});cur=slot+dur+5;xpEst+=h.xpBase;}
}
if(cur<peakS)cur=peakS;
const pending=tasks.filter(t=>t.status!==‘completed’).sort((a,b)=>b.priority-a.priority);
for(const t of pending.filter(x=>x.priority>=3).slice(0,3)){
const dur=t.estimatedMinutes||30;const slot=findSlot(cur,dur);
if(slot!==null){blocks.push({id:uid(),type:‘task’,refId:t.id,title:t.title,startTime:toHM(slot),endTime:toHM(slot+dur),xpValue:t.xpValue,colorId:‘purple’});cur=slot+dur+10;xpEst+=t.xpValue;}
}
if(cur<peakE+60)cur=peakE+60;
for(const t of pending.filter(x=>x.priority<3).slice(0,2)){
const dur=t.estimatedMinutes||30;const slot=findSlot(cur,dur);
if(slot!==null){blocks.push({id:uid(),type:‘task’,refId:t.id,title:t.title,startTime:toHM(slot),endTime:toHM(slot+dur),xpValue:t.xpValue,colorId:‘indigo’});cur=slot+dur+10;xpEst+=t.xpValue;}
}
return{date:dateStr,blocks,xpEst,notes:‘Plan algorithmique — ajoute ta clé API pour un planning IA personnalisé.’,gen:new Date().toISOString(),isAI:false};
}

    <div style={{display:'flex',alignItems:'center',gap:10,padding:'11px 13px',background:'var(--sf2)',border:'1px solid var(--bo)',borderRadius:9}}>
      <div style={{width:38,height:38,borderRadius:9,background:'linear-gradient(135deg,var(--ac),var(--ac2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700,color:'#fff',flexShrink:0}}>{name?name[0].toUpperCase():'?'}</div>
      <div><div style={{fontFamily:'Syne',fontWeight:600,color:'var(--tx)'}}>{name||'Utilisateur NEXUS'}</div><div style={{fontSize:11,color:'var(--mu)',marginTop:1}}>{lv.name} · {xp.toLocaleString()} XP</div></div>
    </div>
  </div>

  <div className="card" style={{marginBottom:14}}>
    {SH('Cortex IA','◈')}
    <div style={{marginBottom:12}}><Lbl c="Fournisseur IA"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7}}>{[{id:'anthropic',l:'Claude',s:'Anthropic'},{id:'groq',l:'Llama 3',s:'Groq'},{id:'ollama',l:'Ollama',s:'Local'}].map(p=><button key={p.id} onClick={()=>setProv(p.id)} style={{padding:'9px 7px',borderRadius:8,textAlign:'left',background:prov===p.id?'rgba(91,110,245,.12)':'var(--sf2)',border:prov===p.id?'1px solid rgba(91,110,245,.4)':'1px solid var(--bo)',cursor:'pointer'}}><div style={{fontFamily:'Syne',fontWeight:600,fontSize:12,color:prov===p.id?'#818cf8':'var(--tx)'}}>{p.l}</div><div style={{fontSize:10,fontFamily:'Space Mono',color:'var(--dm)',marginTop:2}}>{p.s}</div></button>)}</div>
    </div>
    {prov!=='ollama'&&<div style={{marginBottom:10}}><Lbl c={`Clé API (${prov==='anthropic'?'Anthropic':'Groq'})`}/><div style={{position:'relative'}}><input type={showKey?'text':'password'} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-…" style={{paddingRight:42}}/><button onClick={()=>setShowKey(!showKey)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--mu)',cursor:'pointer',fontSize:13}}>{showKey?'👁':'🔒'}</button></div><div style={{fontSize:11,color:'var(--dm)',marginTop:4}}>{prov==='anthropic'?'→ console.anthropic.com/api-keys':'→ console.groq.com'}</div></div>}
    {prov==='ollama'&&<div style={{marginBottom:10}}><Lbl c="URL Ollama"/><input value={oUrl} onChange={e=>setOUrl(e.target.value)} placeholder="http://localhost:11434"/></div>}
    <div style={{padding:'9px 12px',background:'rgba(91,110,245,.05)',border:'1px solid rgba(91,110,245,.12)',borderRadius:7,fontSize:11,color:'var(--mu)'}}>🔐 Ta clé API est stockée localement — jamais envoyée à NEXUS.</div>
  </div>

  <div className="card" style={{marginBottom:14}}>
    {SH('Profil énergétique','⏱')}
    <p style={{fontSize:12,color:'var(--mu)',marginBottom:12}}>Le planificateur IA utilise ces horaires pour optimiser ton emploi du temps.</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      {[['Réveil',wake,setWake],['Début pic d\'énergie',peakS,setPeakS],['Fin pic d\'énergie',peakE,setPeakE],['Coucher',sleep,setSleep]].map(([l,v,set])=><div key={l}><Lbl c={l}/><input type="time" value={v} onChange={e=>set(e.target.value)}/></div>)}
    </div>
    <div style={{marginTop:10,padding:'9px 12px',background:'rgba(6,182,212,.05)',border:'1px solid rgba(6,182,212,.12)',borderRadius:7,fontSize:11,color:'var(--mu)'}}>⚡ Pic d'énergie : {peakS} → {peakE} — tâches importantes prioritaires</div>
  </div>

  {events.length>0&&<div className="card" style={{marginBottom:14}}>
    {SH('Événements récurrents','📅')}
    <div style={{display:'flex',flexDirection:'column',gap:5}}>
      {events.filter(e=>e.recurring!=='none').slice(0,5).map(e=>{
        const ec=getEC(e.color);
        return(<div key={e.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--sf2)',border:`1px solid ${ec.border}`,borderRadius:7,borderLeft:`3px solid ${ec.hex}`}}>
          <span style={{fontSize:11,fontFamily:'Space Mono',color:ec.hex,minWidth:80}}>{e.startTime}–{e.endTime}</span>
          <span style={{flex:1,fontSize:12,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.title}</span>
          <span style={{fontSize:10,color:'var(--dm)',fontFamily:'Space Mono'}}>{recurLabel[e.recurring]||e.recurring}</span>
        </div>);
      })}
      {events.filter(e=>e.recurring!=='none').length>5&&<div style={{fontSize:11,color:'var(--mu)',textAlign:'center'}}>+ {events.filter(e=>e.recurring!=='none').length-5} autres…</div>}
    </div>
  </div>}

  <button onClick={save} className="btn bp" style={{width:'100%',justifyContent:'center',padding:'11px',fontSize:13,marginBottom:14}}>{saved?'✓ Sauvegardé !':'💾 Sauvegarder les paramètres'}</button>

  <div className="card" style={{marginBottom:14}}>
    {SH('Données & Vie privée','🔒')}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:12}}>
      <button onClick={()=>exportJSON(state)} className="btn bg" style={{justifyContent:'center'}}>⬇ Exporter (JSON)</button>
      <label className="btn bg" style={{justifyContent:'center',cursor:'pointer'}}>⬆ Importer (JSON)<input type="file" accept=".json" onChange={importFile} style={{display:'none'}}/></label>
    </div>
    <div style={{borderTop:'1px solid var(--bo)',paddingTop:12}}>
      <div style={{fontSize:9,fontFamily:'Space Mono',color:'var(--dm)',marginBottom:7,letterSpacing:'.08em'}}>ZONE DANGEREUSE</div>
      <button onClick={()=>{if(confirm('⚠ Supprimer TOUTES les données ? Irréversible.'))dispatch({type:'RESET'});}} className="btn bd" style={{fontSize:11,padding:'7px 13px'}}>🗑 Réinitialiser toutes les données</button>
    </div>
  </div>

  <div style={{padding:'16px',textAlign:'center',background:'var(--sf)',border:'1px solid var(--bo)',borderRadius:11}}>
    <div style={{fontFamily:'Syne',fontWeight:800,fontSize:20,letterSpacing:'.12em',background:'linear-gradient(135deg,#5b6ef5,#8b5cf6,#06b6d4)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>NEXUS</div>
    <div style={{fontSize:10,fontFamily:'Space Mono',color:'var(--dm)',marginTop:3}}>v2.0 — Calendrier IA · Stockage local · Open Source</div>
  </div>
</div>

);
}

// ── ROOT APP ───────────────────────────────────────────────────
function App(){
const saved=loadState();
const[state,dispatch]=useReducer(reducer,saved?{…DEFAULT,…saved,events:saved.events||[]}:DEFAULT);
const[view,setView]=useState(‘dashboard’);
const[mobileOpen,setMobileOpen]=useState(false);
const[onboarded,setOnboarded]=useState(!!(saved?.profile?.name));
const lv=getLevel(state.xp);
const xpPct=Math.min(100,Math.round(lv.cur/lv.max*100));
const handleOnboard=name=>{dispatch({type:‘SET_PROFILE’,p:{name}});dispatch({type:‘ADD_XP’,n:10});setOnboarded(true);};
if(!onboarded)return <Ctx.Provider value={{state,dispatch}}><Onboarding onDone={handleOnboard}/></Ctx.Provider>;
const views={dashboard:<Dashboard setView={setView}/>,calendar:<CalendarView/>,goals:<GoalsView/>,habits:<HabitsView/>,analytics:<AnalyticsView/>,assistant:<AssistantView/>,settings:<SettingsView/>};
return(
<Ctx.Provider value={{state,dispatch}}>
<div style={{display:‘flex’,height:‘100vh’,overflow:‘hidden’}}>
<div className=“dsk-sb” style={{width:205,flexShrink:0,height:‘100%’}}><Sidebar view={view} setView={setView} profile={state.profile} lv={lv} xpPct={xpPct} setMobileOpen={setMobileOpen}/></div>
{mobileOpen&&<div style={{position:‘fixed’,inset:0,zIndex:400,display:‘flex’}}><div style={{width:205,height:‘100%’}}><Sidebar view={view} setView={setView} profile={state.profile} lv={lv} xpPct={xpPct} setMobileOpen={setMobileOpen}/></div><div style={{flex:1,background:‘rgba(0,0,0,.55)’,backdropFilter:‘blur(4px)’}} onClick={()=>setMobileOpen(false)}/></div>}
<div style={{flex:1,display:‘flex’,flexDirection:‘column’,minWidth:0,overflow:‘hidden’}}>
<div className=“mob-tb” style={{display:‘flex’,alignItems:‘center’,justifyContent:‘space-between’,padding:‘11px 16px’,background:‘var(–bg2)’,borderBottom:‘1px solid var(–bo)’,flexShrink:0}}>
<button onClick={()=>setMobileOpen(true)} style={{background:‘none’,border:‘none’,color:‘var(–mu)’,fontSize:19,cursor:‘pointer’}}>☰</button>
<div style={{fontFamily:‘Syne’,fontWeight:800,fontSize:17,letterSpacing:’.12em’,background:‘linear-gradient(135deg,#5b6ef5,#8b5cf6)’,WebkitBackgroundClip:‘text’,WebkitTextFillColor:‘transparent’,backgroundClip:‘text’}}>NEXUS</div>
<div style={{fontFamily:‘Space Mono’,fontSize:11,color:’#fbbf24’}}>⚡{state.xp}</div>
</div>
<div style={{flex:1,overflowY:[‘calendar’,‘assistant’].includes(view)?‘hidden’:‘auto’}}>{views[view]||views.dashboard}</div>
</div>
</div>
<style>{`.dsk-sb{display:none}.mob-tb{display:flex}@media(min-width:768px){.dsk-sb{display:block!important}.mob-tb{display:none!important}}`}</style>
</Ctx.Provider>
);
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
</script>
