  const fxd=getDayEvts(events,dateStr);const dow=new Date(dateStr+'T12:00:00').getDay();
  const pend=tasks.filter(t=>t.status!=='completed').sort((a,b)=>b.priority-a.priority);
  const todH=habits.filter(h=>(h.frequency==='daily'||(h.targetDays||[]).includes(dow))&&!h.history.includes(dateStr));
  const upn=state.userProfile?.energyPeak?`\nPic energie utilisateur: ${state.userProfile.energyPeak} - adapter le planning`:'';
  const prompt=`Planning optimal ${dateStr} (${DAYS_F[dow]}).${upn}
PROFIL: Reveil ${profile.wake||'07:00'} Coucher ${profile.sleep||'23:00'} Pic ${profile.peakS||'09:00'}-${profile.peakE||'12:00'}
EVENEMENTS FIXES (pas de chevauchement):
${fxd.length?fxd.map(e=>`- ${e.startTime}-${e.endTime}: ${e.title}${e.location?' ('+e.location+')':''}`).join('\n'):'Aucun'}
TACHES:
${pend.slice(0,8).map(t=>`- id:${t.id} [P${t.priority}] "${t.title}" ~${t.estimatedMinutes||30}min`).join('\n')||'Aucune'}
HABITUDES:
${todH.slice(0,5).map(h=>`- id:${h.id} "${h.emoji||'+'} ${h.title}" ~${h.estimatedMinutes||20}min`).join('\n')||'Aucune'}
REGLES: pas de chevauchement events fixes, P4-P5 pendant pic, pauses 5-10min, max 7 blocs, finir avant ${profile.sleep||'23:00'}
JSON: {"blocks":[{"id":"b1","type":"task","refId":"tid","title":"...","startTime":"HH:MM","endTime":"HH:MM","xpValue":30,"colorId":"purple"}],"xpEst":120,"notes":"conseil"}`;
  const raw=await callAI(state,prompt,'Cortex IA NEXUS. JSON uniquement, aucun texte avant/apres.');
  const data=parseJ(raw);
  return{date:dateStr,blocks:data.blocks||[],xpEst:data.xpEst||0,notes:data.notes||'',gen:new Date().toISOString(),isAI:true};
}
function buildAlgoPlan(state,dateStr){
  const{profile,tasks,habits,events}=state;const dow=new Date(dateStr+'T12:00:00').getDay();
  const fxd=getDayEvts(events,dateStr).map(e=>({s:toMin(e.startTime),e:toMin(e.endTime)}));
  const wk=toMin(profile.wake||'07:00'),sl=toMin(profile.sleep||'23:00');const ps=toMin(profile.peakS||'09:00'),pe=toMin(profile.peakE||'12:00');
  const blk=(s,e)=>fxd.some(f=>s<f.e&&e>f.s);
  const slot=(from,dur)=>{let c=from;while(c+dur<=sl-30){if(!blk(c,c+dur))return c;const bf=fxd.find(f=>c<f.e&&c+dur>f.s);c=bf?bf.e+5:c+5;}return null;};
  let cur=wk+30;const blocks=[];let xpEst=0;
  const todH=habits.filter(h=>(h.frequency==='daily'||(h.targetDays||[]).includes(dow))&&!h.history.includes(dateStr));
  for(const h of todH.slice(0,2)){const dur=h.estimatedMinutes||20;const s=slot(cur,dur);if(s!==null){blocks.push({id:uid(),type:'habit',refId:h.id,title:`${h.emoji||'+'} ${h.title}`,startTime:toHM(s),endTime:toHM(s+dur),xpValue:h.xpBase,colorId:'green'});cur=s+dur+5;xpEst+=h.xpBase;}}
  if(cur<ps)cur=ps;
  const pend=tasks.filter(t=>t.status!=='completed').sort((a,b)=>b.priority-a.priority);
  for(const t of pend.filter(x=>x.priority>=3).slice(0,3)){const dur=t.estimatedMinutes||30;const s=slot(cur,dur);if(s!==null){blocks.push({id:uid(),type:'task',refId:t.id,title:t.title,startTime:toHM(s),endTime:toHM(s+dur),xpValue:t.xpValue,colorId:'purple'});cur=s+dur+10;xpEst+=t.xpValue;}}
  if(cur<pe+60)cur=pe+60;
  for(const t of pend.filter(x=>x.priority<3).slice(0,2)){const dur=t.estimatedMinutes||30;const s=slot(cur,dur);if(s!==null){blocks.push({id:uid(),type:'task',refId:t.id,title:t.title,startTime:toHM(s),endTime:toHM(s+dur),xpValue:t.xpValue,colorId:'indigo'});cur=s+dur+10;xpEst+=t.xpValue;}}
  return{date:dateStr,blocks,xpEst,notes:'Plan auto - ajoutez une cle API pour optimisation IA',gen:new Date().toISOString(),isAI:false};
}

      {showAudit&&<AuditModal onClose={()=>setShowAudit(false)}/>}

}
const QUICK=["Pourquoi je n'arrive pas a etre regulier ?","Analyse ma progression cette semaine","Comment mieux gerer mon temps ?","Quelles habitudes prioriser ?","Aide-moi a rester motive","Optimise mon planning de demain"];

            </div>
          </div>
        )}

          <div key={msg.id} style={{animation:'su .2s ease both',marginLeft:msg.role==='user'?40:0,marginRight:msg.role==='cortex'?40:0}}>
            <div className={msg.role==='cortex'?'cm':'um'}>

                <span style={{fontSize:10,fontFamily:'Space Mono',fontWeight:700,color:msg.role==='cortex'?'#818cf8':'var(--mu)'}}>{msg.role==='cortex'?'&#129504; CORTEX IA':`&#128100; ${profile.name||'MOI'}`}</span>

          </div>

function App(){
  const saved=loadSt();

  return(
    <Ctx.Provider value={{state,dispatch}}>
      <div ref={appRef} style={{display:'flex',height:'100vh',overflow:'hidden'}} onTouchStart={onSbTS} onTouchEnd={onSbTE}>
        <div className="dsk-sb" style={{width:205,flexShrink:0,height:'100%'}}><Sidebar view={view} setView={setView} profile={state.profile} lv={lv} xpPct={xpPct} onClose={()=>setMobileOpen(false)}/></div>

        </div>}

          <div className="mob-tb" style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 16px',background:'var(--bg2)',borderBottom:'1px solid var(--bo)',flexShrink:0}}>
            <button onClick={()=>setMobileOpen(true)} style={{background:'none',border:'none',color:'var(--mu)',fontSize:20,cursor:'pointer',lineHeight:1}}>&#9776;</button>
            <div style={{fontFamily:'Syne',fontWeight:800,fontSize:17,letterSpacing:'.1em',background:'linear-gradient(135deg,var(--ac),var(--ac2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>NEXUS</div>

        </div>
      </div>
    </Ctx.Provider>
  );
}
